name: Collect Intelligence

on:
  workflow_dispatch:
    inputs:
      miningpoolstats_coins:
        description: "MiningPoolStats coin pages to collect. Use 0 for all sitemap coin pages."
        required: true
        default: "80"
      site_limit:
        description: "Official website domains to shallow-crawl. Use 0 for all collected sites."
        required: true
        default: "60"
      pages_per_site:
        description: "Maximum same-site pages to crawl per official website domain."
        required: true
        default: "4"
      run_github:
        description: "Run GitHub Code Search candidate collection."
        type: boolean
        required: true
        default: false
  schedule:
    - cron: "30 2 * * 1"

permissions:
  contents: write

jobs:
  collect:
    name: Collect public mining-pool intelligence
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Capture run start
        id: clock
        shell: bash
        run: echo "started_at=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Resolve collection parameters
        id: params
        shell: bash
        run: |
          echo "miningpoolstats_coins=${{ github.event.inputs.miningpoolstats_coins || '80' }}" >> "$GITHUB_OUTPUT"
          echo "site_limit=${{ github.event.inputs.site_limit || '60' }}" >> "$GITHUB_OUTPUT"
          echo "pages_per_site=${{ github.event.inputs.pages_per_site || '4' }}" >> "$GITHUB_OUTPUT"
          echo "run_github=${{ github.event.inputs.run_github || 'false' }}" >> "$GITHUB_OUTPUT"

      - name: Snapshot previous status totals
        run: python scripts/update_readme_status.py snapshot --output "${{ runner.temp }}/status-baseline.json"

      - name: Collect pool website directory
        run: |
          python scripts/collect_pool_sites.py --max-miningpoolstats-coins "${{ steps.params.outputs.miningpoolstats_coins }}"

      - name: Discover endpoints from official websites
        shell: bash
        run: |
          if [ "${{ steps.params.outputs.site_limit }}" = "0" ]; then
            python scripts/discover_from_pool_sites.py --max-pages-per-site "${{ steps.params.outputs.pages_per_site }}"
          else
            python scripts/discover_from_pool_sites.py --max-sites "${{ steps.params.outputs.site_limit }}" --max-pages-per-site "${{ steps.params.outputs.pages_per_site }}"
          fi

      - name: Collect priority documentation sources
        run: python scripts/collect_intel.py

      - name: Collect GitHub code-search candidates
        if: ${{ steps.params.outputs.run_github == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/collect_github_intel.py

      - name: Run quality checks
        run: python -m unittest discover -s tests

      - name: Update README collection status
        if: always()
        shell: bash
        run: |
          ended_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          python scripts/update_readme_status.py update \
            --baseline "${{ runner.temp }}/status-baseline.json" \
            --started-at "${{ steps.clock.outputs.started_at }}" \
            --ended-at "$ended_at" \
            --conclusion "${{ job.status }}" \
            --event "${{ github.event_name }}" \
            --branch "${{ github.ref_name }}" \
            --commit "${{ github.sha }}" \
            --run-id "${{ github.run_id }}" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --miningpoolstats-coins "${{ steps.params.outputs.miningpoolstats_coins }}" \
            --site-limit "${{ steps.params.outputs.site_limit }}" \
            --pages-per-site "${{ steps.params.outputs.pages_per_site }}" \
            --run-github "${{ steps.params.outputs.run_github }}"

      - name: Commit README collection status
        if: always() && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md data/status/latest_run.json
          if git diff --cached --quiet; then
            echo "No README status changes to commit."
          else
            git commit -m "docs: update collection status"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
            git push
          fi

      - name: Upload collection artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mining-pool-intel-collection
          path: |
            data/*.csv
            data/*.json
            data/raw/*.json
            data/status/*.json
            !data/raw/*_cache/**
